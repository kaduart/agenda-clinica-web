<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Clínica Fonoinova</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #26977b;
            --primary-light: #e8f0fe;
            --secondary: #329189;
            --accent: #1c8565;
            --accent-light: #e8f9f3;
            --danger: #e74c3c;
            --danger-light: #fdedec;
            --warning: #f39c12;
            --warning-light: #fef5e9;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #e0e6ed;
            --bg: #f8fafc;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 25px 30px;
            border-radius: 12px 12px 0 0;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background-color: var(--card-bg);
        }

        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-group {
            position: relative;
        }

        .filter-group label {
            position: absolute;
            top: -10px;
            left: 12px;
            background-color: var(--card-bg);
            padding: 0 5px;
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .filter-group input,
        .filter-group select {
            padding: 10px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            min-width: 180px;
            background-color: var(--card-bg);
            transition: all 0.3s ease;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--secondary);
            transform: translateY(-2px);
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background-color: var(--primary-light);
        }

        .days-filter {
            display: flex;
            gap: 8px;
            padding: 0 20px 15px;
            overflow-x: auto;
            margin-top: 1rem;
        }

        .day-btn {
            flex: 0 0 auto;
            padding: 8px 15px;
            border-radius: 20px;
            background-color: var(--primary-light);
            color: var(--primary);
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .day-btn.active {
            background-color: var(--primary);
            color: white;
        }

        .day-btn:hover:not(.active) {
            background-color: #d6e3ff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background-color: var(--primary-light);
            color: var(--primary);
            padding: 15px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background-color 0.2s ease;
        }

        tbody tr:hover {
            background-color: var(--primary-light);
        }

        td {
            padding: 15px;
            vertical-align: middle;
        }

        .status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status.confirmed {
            background-color: var(--accent-light);
            color: var(--accent);
        }

        .status.pending {
            background-color: var(--warning-light);
            color: var(--warning);
        }

        .status.canceled {
            background-color: var(--danger-light);
            color: var(--danger);
        }

        .action-btn {
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 6px;
        }

        .action-btn.edit {
            background-color: var(--warning-light);
            color: var(--warning);
        }

        .action-btn.delete {
            background-color: var(--danger-light);
            color: var(--danger);
        }

        .action-btn:hover {
            opacity: 0.8;
            transform: translateY(-1px);
        }

        .empty-state {
            padding: 50px 20px;
            text-align: center;
            color: var(--text-light);
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background-color: var(--card-bg);
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
        }

        .modal-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* Estilos para a paginação */
        .pagination-controls {
            display: flex;
            justify-content: center;
            padding: 20px;
            gap: 10px;
            background-color: var(--card-bg);
            border-top: 1px solid var(--border);
        }

        .pagination-controls button {
            padding: 8px 16px;
            border: 1px solid var(--border);
            background-color: var(--card-bg);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pagination-controls button:hover:not(:disabled) {
            background-color: var(--primary-light);
            border-color: var(--primary);
        }

        .pagination-controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Estilos para a lista de profissionais */
        #professionals-list {
            list-style: none;
            padding: 0;
            margin: 0;
            border: 1px solid var(--border);
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        #professionals-list li {
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #professionals-list li:last-child {
            border-bottom: none;
        }

        #professionals-list li:hover {
            background-color: var(--primary-light);
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .toolbar {
                margin-bottom: 1rem;
                flex-direction: column;
                align-items: flex-start;
            }

            .filters {
                width: 100%;
                flex-direction: column;
            }

            .filter-group {
                width: 100%;
            }

            .filter-group input,
            .filter-group select {
                width: 100%;
            }

            .actions {
                width: 100%;
                justify-content: flex-end;
            }

            table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>

        <div class="toolbar">

    <!-- Modal para gerenciar profissionais -->

   <script>
    // ========== CONFIGURAÇÃO GLOBAL ==========
    let allAppointments = []; // Array original completo (nunca altera)
    let filteredAppointments = []; // Array filtrado (usado para renderizar)
    let professionals = ["Dra. Lorany Siqueira", "Dra. Tatiana Celuta", "Dr. Ricardo Maia"];
    let specialties = ["Fonoaudiologia", "Psicologia", "Terapia Ocupacional", "Fisioterapia"];
    let editingId = null;
    let currentPage = 1;
    const itemsPerPage = 50;

    // ========== ELEMENTOS DOM ==========
    const appointmentModal = document.getElementById('appointment-modal');
    const professionalsModal = document.getElementById('professionals-modal');
    const appointmentsBody = document.getElementById('appointments-body');
    const paginationControls = document.querySelector('.pagination-controls');

    // ========== INICIALIZAÇÃO ==========
    document.addEventListener('DOMContentLoaded', () => {
        setCurrentWeek();
        loadInitialData();
        setupEventListeners();
        applyFilters(); // Carrega dados filtrados inicialmente
    });

    // ========== NAVEGAÇÃO DE SEMANA ==========
    function setCurrentWeek() {
        const today = new Date();
        const year = today.getFullYear();
        const week = getISOWeek(today);
        document.getElementById('week-filter').value = `${year}-W${week.toString().padStart(2, '0')}`;
    }

    function getISOWeek(date) {
        const target = new Date(date.valueOf());
        const dayNr = (date.getDay() + 6) % 7;
        target.setDate(target.getDate() - dayNr + 3);
        const jan4 = new Date(target.getFullYear(), 0, 4);
        const dayDiff = (target - jan4) / 86400000;
        return 1 + Math.ceil(dayDiff / 7);
    }

    function navegarSemana(direcao) {
        const input = document.getElementById('week-filter');
        const [ano, semana] = input.value.split('-W');
        let novaSemana = parseInt(semana) + direcao;
        let novoAno = parseInt(ano);

        if (novaSemana > 52) {
            novaSemana = 1;
            novoAno++;
        } else if (novaSemana < 1) {
            novaSemana = 52;
            novoAno--;
        }

        input.value = `${novoAno}-W${novaSemana.toString().padStart(2, '0')}`;
        applyFilters();
    }

    function irParaHoje() {
        setCurrentWeek();
        applyFilters();
    }

    // Retorna array com todas as datas da semana selecionada
    function getWeekDates(weekString) {
        const [year, week] = weekString.split('-W');
        const firstDayOfYear = new Date(year, 0, 1);
        const daysOffset = (parseInt(week) - 1) * 7;
        const firstDayOfWeek = new Date(firstDayOfYear);
        firstDayOfWeek.setDate(firstDayOfYear.getDate() + daysOffset - firstDayOfYear.getDay() + 1);

        const dates = [];
        for (let i = 0; i < 7; i++) {
            const date = new Date(firstDayOfWeek);
            date.setDate(firstDayOfWeek.getDate() + i);
            dates.push(date.toISOString().split('T')[0]);
        }
        return dates;
    }

    // ========== SISTEMA DE FILTROS ==========
    function applyFilters() {
        const weekFilter = document.getElementById('week-filter').value;
        const professionalFilter = document.getElementById('professional-filter').value;
        const specialtyFilter = document.getElementById('specialty-filter').value;
        const statusFilter = document.getElementById('status-filter').value;

        // Começa com todos os agendamentos
        let filtered = [...allAppointments];

        // Filtro por semana
        if (weekFilter) {
            const weekDates = getWeekDates(weekFilter);
            filtered = filtered.filter(app => weekDates.includes(app.date));
        }

        // Filtro por profissional
        if (professionalFilter) {
            filtered = filtered.filter(app => app.professional === professionalFilter);
        }

        // Filtro por especialidade
        if (specialtyFilter) {
            filtered = filtered.filter(app => app.specialty === specialtyFilter);
        }

        // Filtro por status
        if (statusFilter) {
            filtered = filtered.filter(app => app.status === statusFilter);
        }

        filteredAppointments = filtered;
        currentPage = 1;
        renderAppointments();
        updateStats();
    }

    function updateStats() {
        const totalAppointments = filteredAppointments.length;
        const totalLivres = calculateAvailableSlots();
        
        document.getElementById('total-appointments').textContent = `${totalAppointments} agendamentos`;
        document.getElementById('total-livres').textContent = `${totalLivres} vagas livres`;
    }

    function calculateAvailableSlots() {
        // Assumindo 10 slots por dia por profissional
        const weekFilter = document.getElementById('week-filter').value;
        const weekDates = getWeekDates(weekFilter);
        const totalSlots = weekDates.length * professionals.length * 10;
        return totalSlots - filteredAppointments.filter(a => a.status !== 'canceled').length;
    }

    // ========== RENDERIZAÇÃO ==========
    function renderAppointments() {
        appointmentsBody.innerHTML = '';

        if (filteredAppointments.length === 0) {
            appointmentsBody.innerHTML = `
                <tr>
                    <td colspan="8" class="empty-state">
                        <div style="padding: 40px;">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom: 16px; opacity: 0.3;">
                                <path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                            <p style="font-size: 1.1rem; color: var(--text-light);">Nenhum agendamento encontrado nesta semana</p>
                            <p style="font-size: 0.9rem; color: var(--text-light); margin-top: 8px;">Tente ajustar os filtros ou navegue para outra semana</p>
                        </div>
                    </td>
                </tr>
            `;
            paginationControls.style.display = 'none';
            return;
        }

        // Ordenar por data e hora
        const sorted = [...filteredAppointments].sort((a, b) => {
            if (a.date !== b.date) return a.date.localeCompare(b.date);
            return a.time.localeCompare(b.time);
        });

        // Paginação
        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const paginated = sorted.slice(startIndex, endIndex);

        const fragment = document.createDocumentFragment();

        paginated.forEach(appointment => {
            const tr = document.createElement('tr');
            const dateObj = new Date(appointment.date + 'T00:00:00');
            const days = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
            const dayOfWeek = days[dateObj.getDay()];
            const formattedDate = `${appointment.date.split('-').reverse().join('/')} (${dayOfWeek})`;

            tr.innerHTML = `
                <td><strong>${appointment.patient}</strong></td>
                <td>${appointment.responsible || '-'}</td>
                <td>${formattedDate}</td>
                <td><strong>${appointment.time}</strong></td>
                <td>${appointment.professional}</td>
                <td><span style="font-size: 0.85rem; color: var(--text-light);">${appointment.specialty}</span></td>
                <td><span class="status ${appointment.status}">${getStatusText(appointment.status)}</span></td>
                <td>
                    <button class="action-btn edit" onclick="editAppointment(${appointment.id})">✏️ Editar</button>
                    <button class="action-btn delete" onclick="deleteAppointment(${appointment.id})">🗑️ Remover</button>
                </td>
            `;
            fragment.appendChild(tr);
        });

        appointmentsBody.appendChild(fragment);
        updatePaginationControls();
    }

    function updatePaginationControls() {
        const totalPages = Math.ceil(filteredAppointments.length / itemsPerPage);

        if (totalPages <= 1) {
            paginationControls.style.display = 'none';
            return;
        }

        paginationControls.style.display = 'flex';
        document.getElementById('prev-page-btn').disabled = currentPage === 1;
        document.getElementById('next-page-btn').disabled = currentPage === totalPages;
        document.getElementById('page-info').textContent = `Página ${currentPage} de ${totalPages}`;
    }

    function getStatusText(status) {
        const map = {
            'confirmed': 'Confirmado',
            'pending': 'Pendente',
            'canceled': 'Cancelado'
        };
        return map[status] || status;
    }

    // ========== CRUD AGENDAMENTOS ==========
    function editAppointment(id) {
        const appointment = allAppointments.find(a => a.id == id);
        if (!appointment) return;

        editingId = id;
        document.querySelector('#appointment-modal .modal-title').textContent = 'Editar Agendamento';

        document.getElementById('patient-name').value = appointment.patient;
        document.getElementById('responsible').value = appointment.responsible || '';
        document.getElementById('appointment-date').value = appointment.date;
        document.getElementById('appointment-time').value = appointment.time;
        document.getElementById('professional').value = appointment.professional;
        document.getElementById('specialty').value = appointment.specialty;
        document.getElementById('status').value = appointment.status;
        document.getElementById('notes').value = appointment.notes || '';

        appointmentModal.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function saveAppointment() {
        const data = {
            patient: document.getElementById('patient-name').value.trim(),
            responsible: document.getElementById('responsible').value.trim(),
            date: document.getElementById('appointment-date').value,
            time: document.getElementById('appointment-time').value,
            professional: document.getElementById('professional').value,
            specialty: document.getElementById('specialty').value,
            status: document.getElementById('status').value,
            notes: document.getElementById('notes').value.trim()
        };

        if (!data.patient || !data.date || !data.time || !data.professional) {
            alert('Preencha os campos obrigatórios: Paciente, Data, Horário e Profissional');
            return;
        }

        if (editingId) {
            const index = allAppointments.findIndex(a => a.id == editingId);
            if (index !== -1) {
                allAppointments[index] = { ...allAppointments[index], ...data };
            }
        } else {
            const newId = allAppointments.length > 0 ? Math.max(...allAppointments.map(a => a.id)) + 1 : 1;
            allAppointments.unshift({ id: newId, ...data });
        }

        saveToStorage();
        applyFilters();
        closeAllModals();
    }

    function deleteAppointment(id) {
        if (confirm('Confirma a remoção deste agendamento?')) {
            allAppointments = allAppointments.filter(a => a.id != id);
            saveToStorage();
            applyFilters();
        }
    }

    // ========== GERENCIAR PROFISSIONAIS ==========
    function addProfessional() {
        const name = document.getElementById('new-professional').value.trim();
        if (!name) {
            alert('Digite um nome válido');
            return;
        }
        if (professionals.includes(name)) {
            alert('Profissional já cadastrado');
            return;
        }

        professionals.push(name);
        updateProfessionalSelects();
        renderProfessionalsList();
        document.getElementById('new-professional').value = '';
        saveToStorage();
    }

    function removeProfessional(index) {
        if (confirm('Remover este profissional? Agendamentos vinculados não serão afetados.')) {
            professionals.splice(index, 1);
            updateProfessionalSelects();
            renderProfessionalsList();
            saveToStorage();
        }
    }

    function renderProfessionalsList() {
        const list = document.getElementById('professionals-list');
        list.innerHTML = '';

        professionals.forEach((prof, index) => {
            const li = document.createElement('li');
            li.innerHTML = `
                <span><strong>${prof}</strong></span>
                <button class="action-btn delete" onclick="removeProfessional(${index})">🗑️ Remover</button>
            `;
            list.appendChild(li);
        });
    }

    function updateProfessionalSelects() {
        ['professional', 'professional-filter'].forEach(id => {
            const select = document.getElementById(id);
            const current = select.value;
            select.innerHTML = id === 'professional-filter' ? '<option value="">Todos</option>' : '';

            professionals.forEach(prof => {
                const option = document.createElement('option');
                option.value = prof;
                option.textContent = prof;
                select.appendChild(option);
            });

            if (professionals.includes(current)) select.value = current;
        });
    }

    // ========== MODALS ==========
    function closeAllModals() {
        appointmentModal.classList.remove('active');
        professionalsModal.classList.remove('active');
        document.body.style.overflow = 'auto';
    }

    function resetAppointmentForm() {
        document.getElementById('patient-name').value = '';
        document.getElementById('responsible').value = '';
        document.getElementById('appointment-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('appointment-time').value = '08:00';
        document.getElementById('professional').value = professionals[0] || '';
        document.getElementById('specialty').value = specialties[0] || '';
        document.getElementById('status').value = 'confirmed';
        document.getElementById('notes').value = '';
    }

    // ========== STORAGE ==========
    function saveToStorage() {
        localStorage.setItem('fonoinova_appointments', JSON.stringify(allAppointments));
        localStorage.setItem('fonoinova_professionals', JSON.stringify(professionals));
    }

    function loadInitialData() {
        const saved = localStorage.getItem('fonoinova_appointments');
        if (saved) {
            allAppointments = JSON.parse(saved);
        } else {
            // Mock data inicial
            allAppointments = generateMockData();
            saveToStorage();
        }

        const savedProfs = localStorage.getItem('fonoinova_professionals');
        if (savedProfs) {
            professionals = JSON.parse(savedProfs);
        }

        updateProfessionalSelects();
    }

    function generateMockData() {
        const today = new Date();
        const mock = [];
        
        for (let i = 0; i < 7; i++) {
            const date = new Date(today);
            date.setDate(today.getDate() + i - 1);
            const dateStr = date.toISOString().split('T')[0];
            
            professionals.forEach((prof, pIndex) => {
                const numAppointments = Math.floor(Math.random() * 4) + 2;
                for (let j = 0; j < numAppointments; j++) {
                    const hour = 8 + j;
                    mock.push({
                        id: mock.length + 1,
                        patient: `Paciente ${mock.length + 1}`,
                        responsible: `Responsável ${mock.length + 1}`,
                        date: dateStr,
                        time: `${hour.toString().padStart(2, '0')}:00`,
                        professional: prof,
                        specialty: specialties[pIndex % specialties.length],
                        status: ['confirmed', 'pending', 'confirmed', 'confirmed'][j % 4],
                        notes: ''
                    });
                }
            });
        }
        
        return mock;
    }

    // ========== EVENT LISTENERS ==========
    function setupEventListeners() {
        // Modals
        document.getElementById('add-appointment').addEventListener('click', () => {
            editingId = null;
            document.querySelector('#appointment-modal .modal-title').textContent = 'Novo Agendamento';
            resetAppointmentForm();
            appointmentModal.classList.add('active');
            document.body.style.overflow = 'hidden';
        });

        document.getElementById('manage-professionals-btn').addEventListener('click', () => {
            renderProfessionalsList();
            professionalsModal.classList.add('active');
            document.body.style.overflow = 'hidden';
        });

        document.querySelectorAll('.close-btn').forEach(btn => {
            btn.addEventListener('click', closeAllModals);
        });

        appointmentModal.addEventListener('click', (e) => {
            if (e.target === appointmentModal) closeAllModals();
        });

        professionalsModal.addEventListener('click', (e) => {
            if (e.target === professionalsModal) closeAllModals();
        });

        // Salvar agendamento
        document.getElementById('save-appointment').addEventListener('click', saveAppointment);

        // Adicionar profissional
        document.getElementById('add-professional-btn').addEventListener('click', addProfessional);

        // Filtros
        document.getElementById('week-filter').addEventListener('change', applyFilters);
        document.getElementById('professional-filter').addEventListener('change', applyFilters);
        document.getElementById('specialty-filter').addEventListener('change', applyFilters);
        document.getElementById('status-filter').addEventListener('change', applyFilters);
        document.getElementById('search-btn').addEventListener('click', applyFilters);

        // Paginação
        document.getElementById('prev-page-btn').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderAppointments();
            }
        });

        document.getElementById('next-page-btn').addEventListener('click', () => {
            const totalPages = Math.ceil(filteredAppointments.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderAppointments();
            }
        });

        // REMOVER filtros por dia da semana (bugados)
        document.querySelectorAll('.day-btn').forEach(btn => {
            btn.remove(); // Remove completamente os botões de dia
        });
    }
</script>
